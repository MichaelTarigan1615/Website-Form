<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Sosialisasi BPJS</title>
  <link rel="stylesheet" href="style.css">
  <!-- Library Jspreadsheet -->
  <script src="https://bossanova.uk/jspreadsheet/v4/jexcel.js"></script>
  <link rel="stylesheet" href="https://bossanova.uk/jspreadsheet/v4/jexcel.css" type="text/css" />
  <script src="https://jsuites.net/v4/jsuites.js"></script>
  <link rel="stylesheet" href="https://jsuites.net/v4/jsuites.css" type="text/css" />
</head>
<body>

<form id="formData">
  
  <div class="header-form">
    <h2>Form Hasil Sosialisasi</h2>
    <p>Silakan lengkapi data di bawah ini. Tanda <span class="required">*</span> wajib diisi.</p>
  </div>

  <div class="card">
    <label for="nama">Nama Pengisi <span class="required">*</span></label>
    <input type="text" id="nama" placeholder="Jawaban Anda" required>
  </div>

  <div class="card">
    <label for="nim">NIM <span class="required">*</span></label>
    <input type="text" id="nim" placeholder="Jawaban Anda" required>
  </div>

  <div class="card">
    <label for="tanggal">Tanggal Sosialisasi <span class="required">*</span></label>
    <input type="date" id="tanggal" required>
  </div>



  <!-- ... KODE DI ATASNYA TETAP SAMA ... -->
  <div class="section-title">
    <h3>Data Pendaftar</h3>
  </div>
  
  <!-- Wadah Spreadsheet -->
  <div id="spreadsheet" style="width: 100%; margin-bottom: 10px;"></div>

 <!-- Wadah Spreadsheet -->
  <div id="spreadsheet" style="width: 100%; margin-bottom: 10px;"></div>

  <!-- Fitur Tambah Baris Kustom -->
  <div style="display: flex; align-items: center; margin-bottom: 25px; gap: 10px;">
    <label for="jumlahBaris" style="font-size: 14px; color: #202124; font-weight: 500;">Tambah:</label>
    
    <input type="number" id="jumlahBaris" value="5" min="1" max="200" style="padding: 8px; width: 70px; border: 1px solid #dadce0; border-radius: 4px; text-align: center; font-size: 14px; outline: none;">
    
    <span style="font-size: 14px; color: #202124;">baris kosong</span>
    
    <button type="button" onclick="tambahBarisExcel()" style="padding: 8px 15px; background: #f6fafe; color: #673ab7; border: 1px solid #dadce0; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;">
      + Tambah
    </button>
  </div>

  <div class="submit-container">
    <button type="submit" class="submit-btn">Kirim Form</button>
  </div>
  

</form>

<script src="dataWilayah.js"></script>
<script src="script.js"></script>
</body>
</html>
